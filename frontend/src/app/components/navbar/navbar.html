<nav class="navbar">
  <div class="logo">Employee System</div>

  <div class="nav-links">
    @if (isLoggedIn) {
      <span class="welcome-text">Welcome, {{ username }}</span>

      <button type="button" (click)="onEmployees()">Employees</button>
      <button type="button" (click)="onAddEmployee()">Add Employee</button>
      <button type="button" class="login-btn" (click)="onLogout()">Logout</button>
    } @else {
      <button type="button" class="login-btn" (click)="onLogin()">Login</button>
    }
  </div>
</nav>
