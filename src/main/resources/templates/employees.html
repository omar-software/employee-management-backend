<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Employees</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f7fa;
            color: #222;
        }

        .navbar {
            background-color: #111827;
            color: white;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
        }

        .navbar-title {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.3px;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .username {
            color: #e5e7eb;
            font-size: 14px;
            padding: 7px 12px;
            background-color: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
        }

        .username strong {
            color: #ffffff;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .logout-form {
            display: inline;
            margin: 0;
        }

        .logout-btn {
            background-color: transparent;
            color: white;
            border: 1px solid #ffffff;
            padding: 8px 13px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background-color: white;
            color: #111827;
        }

        .container {
            max-width: 1050px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-card {
            background-color: white;
            border-radius: 14px;
            padding: 26px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        h1 {
            margin: 0;
            color: #111827;
            font-size: 28px;
        }

        .subtitle {
            margin-top: 6px;
            color: #6b7280;
            font-size: 14px;
        }

        .alert-success {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background-color: #111827;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: #374151;
        }

        .btn-edit {
            background-color: #2563eb;
        }

        .btn-edit:hover {
            background-color: #1d4ed8;
        }

        .btn-delete {
            background-color: #dc2626;
        }

        .btn-delete:hover {
            background-color: #b91c1c;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        th {
            background-color: #111827;
            color: white;
            font-size: 14px;
        }

        tr:nth-child(even) {
            background-color: #f9fafb;
        }

        tr:hover {
            background-color: #f3f4f6;
        }

        td {
            font-size: 14px;
        }

        @media (max-width: 700px) {
            .navbar {
                padding: 16px 20px;
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .navbar-right {
                flex-wrap: wrap;
                gap: 12px;
            }

            .top-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 14px;
            }

            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-title">Employee Management</div>

    <div class="navbar-right">
        <span class="username">
            Welcome, <strong sec:authentication="name">admin</strong>
        </span>

        <a th:href="@{/employees-page}">Employees</a>
        <a th:href="@{/api/employees}" target="_blank">API</a>

        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="page-card">

        <div class="top-bar">
            <div>
                <h1>Employee List</h1>
                <div class="subtitle">View, add, edit, and delete employees</div>
            </div>

            <a class="btn" th:href="@{/employees-page/new}">
                + Add Employee
            </a>
        </div>

        <div class="alert-success" th:if="${successMessage}" th:text="${successMessage}">
            Success message
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="employee : ${employees}">
                    <td th:text="${employee.id}"></td>
                    <td th:text="${employee.firstName}"></td>
                    <td th:text="${employee.lastName}"></td>
                    <td th:text="${employee.email}"></td>
                    <td>
                        <div class="actions">
                            <a class="btn btn-edit"
                               th:href="@{/employees-page/edit/{id}(id=${employee.id})}">
                                Edit
                            </a>

                            <a class="btn btn-delete"
                               th:href="@{/employees-page/delete/{id}(id=${employee.id})}"
                               onclick="return confirm('Are you sure you want to delete this employee?');">
                                Delete
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

</body>
</html>
