<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Employee Form</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f7fa;
            color: #222;
        }

        .navbar {
            background-color: #111827;
            color: white;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
        }

        .navbar-title {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.3px;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .username {
            color: #e5e7eb;
            font-size: 14px;
            padding: 7px 12px;
            background-color: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
        }

        .username strong {
            color: #ffffff;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .logout-form {
            display: inline;
            margin: 0;
        }

        .logout-btn {
            background-color: transparent;
            color: white;
            border: 1px solid #ffffff;
            padding: 8px 13px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background-color: white;
            color: #111827;
        }

        .container {
            max-width: 650px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .form-card {
            background-color: white;
            padding: 30px;
            border-radius: 14px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 6px;
            color: #111827;
            font-size: 28px;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 26px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 7px;
            color: #374151;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            box-sizing: border-box;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: #111827;
            box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.12);
        }

        .error {
            color: #b91c1c;
            background-color: #fee2e2;
            border: 1px solid #fecaca;
            font-size: 13px;
            margin-top: 7px;
            padding: 8px 10px;
            border-radius: 8px;
        }

        .actions {
            margin-top: 24px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 11px 18px;
            background-color: #111827;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #374151;
        }

        .back-link {
            display: inline-block;
            padding: 11px 18px;
            color: #111827;
            text-decoration: none;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-weight: bold;
            background-color: white;
            transition: 0.2s;
        }

        .back-link:hover {
            background-color: #f3f4f6;
        }

        @media (max-width: 700px) {
            .navbar {
                padding: 16px 20px;
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .navbar-right {
                flex-wrap: wrap;
                gap: 12px;
            }

            .form-card {
                padding: 24px;
            }

            .actions {
                flex-direction: column;
            }

            button,
            .back-link {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-title">Employee Management</div>

    <div class="navbar-right">
        <span class="username">
            Welcome, <strong sec:authentication="name">admin</strong>
        </span>

        <a th:href="@{/employees-page}">Employees</a>
        <a th:href="@{/api/employees}" target="_blank">API</a>

        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <h1 th:text="${pageTitle}">Employee Form</h1>
        <div class="subtitle">Fill in the employee information below</div>

        <form th:action="@{${formAction}}" th:object="${employee}" method="post">

            <div class="form-group">
                <label for="firstName">First Name</label>
                <input id="firstName"
                       type="text"
                       th:field="*{firstName}"
                       placeholder="Enter first name">
                <div class="error"
                     th:if="${#fields.hasErrors('firstName')}"
                     th:errors="*{firstName}">
                </div>
            </div>

            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input id="lastName"
                       type="text"
                       th:field="*{lastName}"
                       placeholder="Enter last name">
                <div class="error"
                     th:if="${#fields.hasErrors('lastName')}"
                     th:errors="*{lastName}">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email"
                       type="email"
                       th:field="*{email}"
                       placeholder="Enter email address">
                <div class="error"
                     th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}">
                </div>
            </div>

            <div class="actions">
                <button type="submit">Save Employee</button>

                <a class="back-link" th:href="@{/employees-page}">
                    Back
                </a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
